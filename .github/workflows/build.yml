name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get Version
        id: get_version
        run: echo "VERSION=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot

      - name: Install Dependencies
        run: npm install

      - name: Build and Package
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: |
            dist_electron/*.AppImage
            dist_electron/*.deb
            dist_electron/*.pacman
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Old Releases
        run: |
          # The softprops/action-gh-release doesn't directly output release ID in v1 easily 
          # so we identify the "current" one by its tag name and its recentness
          current_tag="${{ steps.get_version.outputs.VERSION }}"
          
          # Wait a bit for GitHub to reflect the release creation/update
          sleep 5
          
          # List ALL releases (including drafts)
          # We want to keep only the LATEST release for that tag (or just the latest release overall)
          # Given the requirement: "menghapus semua rilis yang ada kecuali yang baru dirilis"
          
          # Get all release IDs sorted by creation (descending)
          # We'll keep the top one (the one just created/updated) and delete others
          ids=$(gh api repos/${{ github.repository }}/releases --jq 'sort_by(.created_at) | reverse | .[].id')
          
          # If we have multiple releases, the first one in the list is the one we just made
          first=true
          for id in $ids; do
            if [ "$first" = true ]; then
              echo "Keeping latest release ID: $id"
              first=false
            else
              echo "Deleting old release ID: $id"
              gh api -X DELETE repos/${{ github.repository }}/releases/$id || true
            fi
          done
          
          # Cleanup any orphaned tags that might have been left behind
          # but keep the current version's tag
          all_tags=$(gh api repos/${{ github.repository }}/git/matching-refs/tags --jq '.[].ref' | sed 's/refs\/tags\///')
          for tag in $all_tags; do
            if [ "$tag" != "$current_tag" ]; then
              # If tag has no associated release, delete it
              if ! gh release view "$tag" >/dev/null 2>&1; then
                echo "Deleting orphaned tag: $tag"
                gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/$tag || true
              fi
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
